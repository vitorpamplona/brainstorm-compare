<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Search</title>
<style>
  :root {
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #ddd;
    --accent: #2563eb;
    --hover: #f0f4ff;
    --card: #fff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .page { max-width: 720px; margin: 0 auto; padding: 0 16px; }
  .hero { min-height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 12vh; }
  .search-wrap { position: relative; width: 100%; max-width: 560px; }
  #q {
    width: 100%;
    padding: 14px 18px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 28px;
    outline: none;
    background: var(--card);
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
    transition: border-color .15s, box-shadow .15s;
  }
  #q:focus { border-color: var(--accent); box-shadow: 0 1px 6px rgba(37,99,235,.15); }
  .popup {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,.08);
    max-height: 60vh;
    overflow-y: auto;
    z-index: 10;
    display: none;
  }
  .popup.open { display: block; }
  .popup-item {
    display: flex;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid #f0f0f0;
    cursor: default;
    align-items: center;
  }
  .popup-item:last-child { border-bottom: 0; }
  .popup-item:hover, .popup-item.active { background: var(--hover); }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #eee;
    object-fit: cover;
    flex-shrink: 0;
  }
  .row-main { flex: 1; min-width: 0; }
  .row-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-about { color: var(--muted); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-meta { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .meta-bar { display: flex; justify-content: space-between; color: var(--muted); font-size: 13px; padding: 16px 0 8px; }
  .results { padding: 8px 0 48px; }
  .result {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .result-header { display: flex; gap: 14px; align-items: center; margin-bottom: 10px; }
  .result-header .avatar { width: 56px; height: 56px; }
  .result-header .who { flex: 1; min-width: 0; }
  .result-name { font-size: 17px; font-weight: 600; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result-display { color: var(--muted); font-size: 13px; }
  .quality {
    flex-shrink: 0;
    text-align: center;
    line-height: 1;
    padding-left: 12px;
  }
  .quality-num { font-size: 32px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .quality-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; }
  .result-about { margin: 8px 0; }
  .props { display: grid; grid-template-columns: 140px 1fr; gap: 4px 12px; font-size: 13px; margin-top: 8px; }
  .props dt { color: var(--muted); }
  .props dd { margin: 0; word-break: break-all; }
  .props a { color: var(--accent); text-decoration: none; }
  .props a:hover { text-decoration: underline; }
  .empty, .error { padding: 24px; text-align: center; color: var(--muted); }
  .error { color: #c00; }
  .timing { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="search-wrap">
      <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="Type to search&hellip;" autofocus />
      <div id="popup" class="popup" role="listbox"></div>
    </div>
  </div>
  <div id="meta" class="meta-bar" hidden></div>
  <div id="results" class="results"></div>
</div>

<script>
(() => {
  const API = "https://vespa-staging.nosfabrica.com/search";
  const POPUP_LIMIT = 8;
  const DEBOUNCE_MS = 120;

  const $q = document.getElementById("q");
  const $popup = document.getElementById("popup");
  const $meta = document.getElementById("meta");
  const $results = document.getElementById("results");

  let popupAbort = null;
  let fullAbort = null;
  let debounceTimer = null;
  let activeIdx = -1;
  let popupHits = [];

  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

  function search(text, { signal, limit }) {
    return fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query_text: text }),
      signal,
    }).then(r => {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    });
  }

  function avatarHtml(hit) {
    if (hit.picture) {
      return `<img class="avatar" src="${esc(hit.picture)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'avatar'}))" />`;
    }
    return `<div class="avatar"></div>`;
  }

  function renderPopup(hits) {
    popupHits = hits.slice(0, POPUP_LIMIT);
    if (popupHits.length === 0) {
      $popup.innerHTML = `<div class="empty">No results</div>`;
      $popup.classList.add("open");
      return;
    }
    $popup.innerHTML = popupHits.map((h, i) => `
      <div class="popup-item" data-idx="${i}" role="option">
        ${avatarHtml(h)}
        <div class="row-main">
          <div class="row-name">${esc(h.name || h.display_name || h.pubkey?.slice(0,16) || "(unnamed)")}</div>
          <div class="row-about">${esc(h.about || h.display_name || "")}</div>
        </div>
        <div class="row-meta">★ ${h.quality_score ?? 0}</div>
      </div>
    `).join("");
    $popup.classList.add("open");
    activeIdx = -1;
  }

  function closePopup() {
    $popup.classList.remove("open");
    $popup.innerHTML = "";
    activeIdx = -1;
  }

  function setActive(idx) {
    const items = $popup.querySelectorAll(".popup-item");
    if (items.length === 0) return;
    if (idx < 0) idx = items.length - 1;
    if (idx >= items.length) idx = 0;
    items.forEach(el => el.classList.remove("active"));
    items[idx].classList.add("active");
    items[idx].scrollIntoView({ block: "nearest" });
    activeIdx = idx;
  }

  function renderFullResults(text, data, elapsedMs) {
    const hits = data.hits || [];
    $meta.hidden = false;
    $meta.innerHTML = `
      <span>${hits.length} of ${data.total ?? hits.length} results for <strong>${esc(text)}</strong></span>
      <span class="timing">${elapsedMs} ms</span>
    `;
    if (hits.length === 0) {
      $results.innerHTML = `<div class="empty">No results.</div>`;
      return;
    }
    $results.innerHTML = hits.map(h => renderResult(h)).join("");
  }

  function renderResult(h) {
    const SKIP = new Set(["sddocname","documentid","name","display_name","about","picture","banner","quality_score","_relevance"]);
    const props = Object.keys(h)
      .filter(k => !SKIP.has(k) && h[k] !== null && h[k] !== "")
      .map(k => {
        const v = h[k];
        let val;
        if (typeof v === "string" && /^https?:\/\//i.test(v)) {
          val = `<a href="${esc(v)}" target="_blank" rel="noopener noreferrer">${esc(v)}</a>`;
        } else if (typeof v === "object") {
          val = `<code>${esc(JSON.stringify(v))}</code>`;
        } else {
          val = esc(v);
        }
        return `<dt>${esc(k)}</dt><dd>${val}</dd>`;
      }).join("");

    return `
      <article class="result">
        <div class="result-header">
          ${avatarHtml(h)}
          <div class="who">
            <h2 class="result-name">${esc(h.name || h.display_name || "(unnamed)")}</h2>
            ${h.display_name && h.display_name !== h.name ? `<div class="result-display">${esc(h.display_name)}</div>` : ""}
          </div>
          <div class="quality">
            <div class="quality-num">${h.quality_score ?? 0}</div>
            <div class="quality-label">Quality</div>
          </div>
        </div>
        ${h.about ? `<div class="result-about">${esc(h.about)}</div>` : ""}
        <dl class="props">${props}</dl>
      </article>
    `;
  }

  async function runPopupSearch(text) {
    if (popupAbort) popupAbort.abort();
    popupAbort = new AbortController();
    try {
      const data = await search(text, { signal: popupAbort.signal, limit: POPUP_LIMIT });
      renderPopup(data.hits || []);
    } catch (e) {
      if (e.name !== "AbortError") {
        $popup.innerHTML = `<div class="error">Error: ${esc(e.message)}</div>`;
        $popup.classList.add("open");
      }
    }
  }

  async function runFullSearch(text) {
    if (fullAbort) fullAbort.abort();
    fullAbort = new AbortController();
    closePopup();
    $meta.hidden = false;
    $meta.innerHTML = `<span>Searching for <strong>${esc(text)}</strong>&hellip;</span>`;
    $results.innerHTML = "";
    const t0 = performance.now();
    try {
      const data = await search(text, { signal: fullAbort.signal });
      renderFullResults(text, data, Math.round(performance.now() - t0));
    } catch (e) {
      if (e.name !== "AbortError") {
        $results.innerHTML = `<div class="error">Error: ${esc(e.message)}</div>`;
      }
    }
  }

  $q.addEventListener("input", () => {
    const text = $q.value.trim();
    clearTimeout(debounceTimer);
    if (!text) {
      if (popupAbort) popupAbort.abort();
      closePopup();
      return;
    }
    debounceTimer = setTimeout(() => runPopupSearch(text), DEBOUNCE_MS);
  });

  $q.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      const text = $q.value.trim();
      if (!text) return;
      if (activeIdx >= 0 && popupHits[activeIdx]) {
        const h = popupHits[activeIdx];
        $q.value = h.name || h.display_name || $q.value;
      }
      runFullSearch($q.value.trim());
    } else if (e.key === "ArrowDown") {
      if ($popup.classList.contains("open")) { e.preventDefault(); setActive(activeIdx + 1); }
    } else if (e.key === "ArrowUp") {
      if ($popup.classList.contains("open")) { e.preventDefault(); setActive(activeIdx - 1); }
    } else if (e.key === "Escape") {
      closePopup();
    }
  });

  $popup.addEventListener("mousedown", (e) => {
    const item = e.target.closest(".popup-item");
    if (!item) return;
    e.preventDefault();
    const idx = Number(item.dataset.idx);
    const h = popupHits[idx];
    if (h) {
      $q.value = h.name || h.display_name || $q.value;
      runFullSearch($q.value.trim());
    }
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-wrap")) closePopup();
  });

  $q.addEventListener("focus", () => {
    if (popupHits.length > 0 && $q.value.trim()) $popup.classList.add("open");
  });
})();
</script>
</body>
</html>
