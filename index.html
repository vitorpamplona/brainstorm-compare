<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Search</title>
<link rel="preconnect" href="https://vespa-staging.nosfabrica.com" crossorigin />
<link rel="preconnect" href="https://brainstorm.world" crossorigin />
<style>
  :root {
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #ddd;
    --accent: #2563eb;
    --hover: #f0f4ff;
    --card: #fff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .page { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
  .hero { min-height: 30vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 8vh; }
  .search-wrap { position: relative; width: 100%; max-width: 720px; }
  .weights {
    width: 100%;
    max-width: 720px;
    margin-bottom: 14px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
  }
  .weights-head { display: flex; justify-content: space-between; align-items: center; color: var(--muted); margin-bottom: 8px; }
  .weights-head .title { font-weight: 600; color: var(--fg); }
  .weights-reset { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 11px; cursor: pointer; color: var(--muted); }
  .weights-reset:hover { background: var(--hover); color: var(--accent); border-color: var(--accent); }
  .weights-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 12px; }
  .weights-grid label { display: flex; flex-direction: column; gap: 2px; }
  .weights-grid label span { color: var(--muted); font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .weights-grid input { width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; font: inherit; font-variant-numeric: tabular-nums; }
  .weights-grid input:focus { outline: none; border-color: var(--accent); }
  @media (max-width: 560px) { .weights-grid { grid-template-columns: repeat(2, 1fr); } }
  #q {
    width: 100%;
    padding: 14px 18px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 28px;
    outline: none;
    background: var(--card);
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
    transition: border-color .15s, box-shadow .15s;
  }
  #q:focus { border-color: var(--accent); box-shadow: 0 1px 6px rgba(37,99,235,.15); }

  .popup {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,.08);
    z-index: 10;
    display: none;
    overflow: hidden;
  }
  .popup.open { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
  .popup-col { max-height: 60vh; overflow-y: auto; }
  .popup-col + .popup-col { border-left: 1px solid #eee; }
  .popup-col-head { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 8px 14px; background: #fafafa; border-bottom: 1px solid #eee; position: sticky; top: 0; display: flex; justify-content: space-between; }
  .popup-col-head .timing { font-variant-numeric: tabular-nums; }
  .popup-item {
    display: flex;
    gap: 10px;
    padding: 9px 12px;
    border-bottom: 1px solid #f0f0f0;
    align-items: center;
  }
  .popup-item:last-child { border-bottom: 0; }
  .popup-item:hover, .popup-item.active { background: var(--hover); }
  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: #eee;
    object-fit: cover;
    flex-shrink: 0;
  }
  .row-main { flex: 1; min-width: 0; }
  .row-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
  .row-about { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-meta { font-size: 12px; color: var(--muted); flex-shrink: 0; font-variant-numeric: tabular-nums; }

  .columns {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 16px;
    padding: 16px 0 48px;
  }
  .columns > .col { min-width: 0; }
  .col-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 4px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 12px;
  }
  .col-title { font-weight: 600; font-size: 15px; }
  .col-stats { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

  .result {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .result-header { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; }
  .result-header .avatar { width: 48px; height: 48px; }
  .result-header .who { flex: 1; min-width: 0; }
  .result-name { font-size: 16px; font-weight: 600; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result-display { color: var(--muted); font-size: 12px; }
  .quality {
    flex-shrink: 0;
    text-align: center;
    line-height: 1;
    padding-left: 10px;
  }
  .quality-num { font-size: 28px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .quality-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 3px; }
  .result-about { margin: 6px 0; font-size: 13px; }
  .props { display: grid; grid-template-columns: 110px 1fr; gap: 3px 10px; font-size: 12px; margin-top: 6px; }
  .props dt { color: var(--muted); }
  .props dd { margin: 0; word-break: break-all; }
  .props a { color: var(--accent); text-decoration: none; }
  .props a:hover { text-decoration: underline; }
  .empty, .error { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; }
  .error { color: #c00; }

  @media (max-width: 720px) {
    .popup.open, .columns { grid-template-columns: minmax(0, 1fr); }
    .popup-col + .popup-col { border-left: 0; border-top: 1px solid #eee; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="weights">
      <div class="weights-head">
        <span class="title">Vespa weights</span>
        <button type="button" class="weights-reset" id="weights-reset">Reset</button>
      </div>
      <div class="weights-grid" id="weights-grid"></div>
    </div>
    <div class="search-wrap">
      <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="Type to search&hellip;" autofocus />
      <div id="popup" class="popup" role="listbox"></div>
    </div>
  </div>
  <div id="columns" class="columns" hidden></div>
</div>

<script>
(() => {
  const POPUP_LIMIT = 8;
  const FULL_LIMIT = 40;
  const DEBOUNCE_MS = 120;

  const VESPA_WEIGHT_DEFAULTS = {
    w_name: 3,
    w_display_name: 0,
    w_about: 1.0,
    w_name_gram: 0.5,
    w_display_name_gram: 0,
    w_pubkey_gram: 0.1,
    w_quality: 1.0,
  };
  const vespaWeights = { ...VESPA_WEIGHT_DEFAULTS };

  const engines = [
    {
      id: "brainstorm",
      title: "Meili",
      search(text, signal, limit) {
        const url = `https://brainstorm.world/api/search/profiles/meili?q=${encodeURIComponent(text)}&limit=${limit}&offset=0&wotPov=house`;
        return fetch(url, { signal }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        }).then(d => ({
          hits: d.hits || [],
          total: d.estimatedTotalHits ?? (d.hits || []).length,
          extra: { povSuffix: d.povSuffix },
        }));
      },
      qualityOf(h, extra) {
        const suffix = extra?.povSuffix;
        if (suffix && h["wot_rank_" + suffix] != null) return h["wot_rank_" + suffix];
        return h.wot_rank ?? 0;
      },
      qualityLabel: "WoT",
      skipProps: new Set(["name","display_name","displayName","about","picture","banner","event_sig","event_id"]),
    },
    {
      id: "vespa",
      title: "Vespa",
      search(text, signal) {
        return fetch("https://vespa-staging.nosfabrica.com/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query_text: text, ...vespaWeights }),
          signal,
        }).then(r => {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        }).then(d => ({
          hits: d.hits || [],
          total: d.total ?? (d.hits || []).length,
          extra: {},
        }));
      },
      qualityOf(h) { return h.quality_score ?? 0; },
      qualityLabel: "Quality",
      skipProps: new Set(["sddocname","documentid","name","display_name","about","picture","banner","quality_score","_relevance"]),
    },
  ];

  const $q = document.getElementById("q");
  const $popup = document.getElementById("popup");
  const $columns = document.getElementById("columns");

  const state = engines.map(() => ({
    popupAbort: null,
    fullAbort: null,
    requestId: 0,
    hits: [],
    extra: {},
    total: null,
    lastMs: null,
    loading: false,
    error: null,
  }));
  let debounceTimer = null;
  let activeKey = null;

  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  const fmt = (n) => typeof n === "number" && !Number.isInteger(n) ? n.toFixed(2) : String(n);

  function avatarHtml(pic) {
    if (pic) return `<img class="avatar" src="${esc(pic)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'avatar'}))" />`;
    return `<div class="avatar"></div>`;
  }

  function nameOf(h) { return h.name || h.display_name || h.displayName || (h.pubkey && h.pubkey.slice(0,16)) || "(unnamed)"; }
  function pictureOf(h) { return h.picture || ""; }
  function aboutOf(h) { return h.about || ""; }

  function ensurePopupSkeleton() {
    if ($popup.dataset.ready) return;
    $popup.innerHTML = engines.map((_, i) => `<div class="popup-col" data-eng="${i}"></div>`).join("");
    $popup.dataset.ready = "1";
  }
  function ensureColumnsSkeleton() {
    if ($columns.dataset.ready) return;
    $columns.innerHTML = engines.map((_, i) => `<div class="col" data-eng="${i}"></div>`).join("");
    $columns.dataset.ready = "1";
  }

  function renderEnginePopup(i) {
    ensurePopupSkeleton();
    const eng = engines[i];
    const s = state[i];
    const col = $popup.querySelector(`.popup-col[data-eng="${i}"]`);
    if (!col) return;
    const count = (s.hits || []).length;
    const countText = s.error ? "" : `${count} of ${s.total ?? "?"}`;
    const timing = s.lastMs != null ? `${s.lastMs} ms` : "";
    const meta = [countText, timing].filter(Boolean).join(" · ");
    const head = `<div class="popup-col-head"><span>${esc(eng.title)}</span><span class="timing">${meta}</span></div>`;
    let body;
    if (s.error) body = `<div class="error">${esc(s.error)}</div>`;
    else if (s.loading && (!s.hits || s.hits.length === 0)) body = `<div class="empty">Loading&hellip;</div>`;
    else if (!s.hits || s.hits.length === 0) body = `<div class="empty">No results</div>`;
    else {
      body = s.hits.slice(0, POPUP_LIMIT).map((h, j) => `
        <div class="popup-item" data-eng="${i}" data-idx="${j}" role="option">
          ${avatarHtml(pictureOf(h))}
          <div class="row-main">
            <div class="row-name">${esc(nameOf(h))}</div>
            <div class="row-about">${esc(aboutOf(h))}</div>
          </div>
          <div class="row-meta">${esc(fmt(eng.qualityOf(h, s.extra)))}</div>
        </div>
      `).join("");
    }
    col.innerHTML = head + body;
  }

  function renderResult(eng, h, extra) {
    const propEntries = Object.keys(h)
      .filter(k => !eng.skipProps.has(k) && !k.startsWith("wot_") && h[k] !== null && h[k] !== "" && h[k] !== undefined)
      .map(k => {
        const v = h[k];
        let val;
        if (typeof v === "string" && /^https?:\/\//i.test(v)) {
          val = `<a href="${esc(v)}" target="_blank" rel="noopener noreferrer">${esc(v)}</a>`;
        } else if (typeof v === "object") {
          val = `<code>${esc(JSON.stringify(v))}</code>`;
        } else {
          val = esc(fmt(v));
        }
        return `<dt>${esc(k)}</dt><dd>${val}</dd>`;
      }).join("");
    const dn = h.display_name || h.displayName;
    return `
      <article class="result">
        <div class="result-header">
          ${avatarHtml(pictureOf(h))}
          <div class="who">
            <h2 class="result-name">${esc(nameOf(h))}</h2>
            ${dn && dn !== h.name ? `<div class="result-display">${esc(dn)}</div>` : ""}
          </div>
          <div class="quality">
            <div class="quality-num">${esc(fmt(eng.qualityOf(h, extra)))}</div>
            <div class="quality-label">${esc(eng.qualityLabel)}</div>
          </div>
        </div>
        ${aboutOf(h) ? `<div class="result-about">${esc(aboutOf(h))}</div>` : ""}
        <dl class="props">${propEntries}</dl>
      </article>
    `;
  }

  function renderEngineColumn(i) {
    ensureColumnsSkeleton();
    const eng = engines[i];
    const s = state[i];
    const col = $columns.querySelector(`.col[data-eng="${i}"]`);
    if (!col) return;
    const stats = s.error ? "" : `${(s.hits||[]).length} of ${s.total ?? "?"} · ${s.lastMs ?? "?"} ms`;
    const head = `
      <div class="col-head">
        <div class="col-title">${esc(eng.title)}</div>
        <div class="col-stats">${stats}</div>
      </div>`;
    let body;
    if (s.error) body = `<div class="error">${esc(s.error)}</div>`;
    else if (s.loading && (!s.hits || s.hits.length === 0)) body = `<div class="empty">Searching&hellip;</div>`;
    else if (!s.hits || s.hits.length === 0) body = `<div class="empty">No results.</div>`;
    else body = s.hits.map(h => renderResult(eng, h, s.extra)).join("");
    col.innerHTML = head + body;
  }

  function openPopup() { ensurePopupSkeleton(); $popup.classList.add("open"); }
  function closePopup() { $popup.classList.remove("open"); activeKey = null; }

  function popupItems() { return Array.from($popup.querySelectorAll(".popup-item")); }
  function setActive(idx) {
    const items = popupItems();
    if (items.length === 0) return;
    if (idx < 0) idx = items.length - 1;
    if (idx >= items.length) idx = 0;
    items.forEach(el => el.classList.remove("active"));
    items[idx].classList.add("active");
    items[idx].scrollIntoView({ block: "nearest" });
    activeKey = idx;
  }

  async function runEngine(i, text, mode) {
    const eng = engines[i];
    const s = state[i];
    const myId = ++s.requestId;
    const abortKey = mode === "popup" ? "popupAbort" : "fullAbort";
    if (s[abortKey]) s[abortKey].abort();
    s[abortKey] = new AbortController();
    s.loading = true;
    s.error = null;
    const limit = mode === "popup" ? POPUP_LIMIT : FULL_LIMIT;
    const t0 = performance.now();
    try {
      const out = await eng.search(text, s[abortKey].signal, limit);
      if (myId !== s.requestId) return null;
      s.hits = out.hits;
      s.total = out.total;
      s.extra = out.extra;
      s.lastMs = Math.round(performance.now() - t0);
      s.loading = false;
    } catch (e) {
      if (myId !== s.requestId) return null;
      if (e.name === "AbortError") return null;
      s.error = e.message || String(e);
      s.hits = [];
      s.lastMs = Math.round(performance.now() - t0);
      s.loading = false;
    }
    return mode;
  }

  function runPopupSearch(text) {
    openPopup();
    engines.forEach((_, i) => {
      const s = state[i];
      s.loading = true;
      s.error = null;
      renderEnginePopup(i);
    });
    engines.forEach((_, i) => {
      runEngine(i, text, "popup").then(mode => { if (mode === "popup") renderEnginePopup(i); });
    });
  }

  function runFullSearch(text) {
    closePopup();
    $columns.hidden = false;
    ensureColumnsSkeleton();
    engines.forEach((_, i) => {
      const s = state[i];
      s.loading = true;
      s.error = null;
      s.hits = [];
      renderEngineColumn(i);
    });
    engines.forEach((_, i) => {
      runEngine(i, text, "full").then(mode => { if (mode === "full") renderEngineColumn(i); });
    });
  }

  $q.addEventListener("input", () => {
    const text = $q.value.trim();
    clearTimeout(debounceTimer);
    if (!text) {
      engines.forEach((_, i) => { if (state[i].popupAbort) state[i].popupAbort.abort(); });
      closePopup();
      return;
    }
    debounceTimer = setTimeout(() => runPopupSearch(text), DEBOUNCE_MS);
  });

  $q.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      const text = $q.value.trim();
      if (!text) return;
      runFullSearch(text);
    } else if (e.key === "ArrowDown") {
      if ($popup.classList.contains("open")) { e.preventDefault(); setActive((activeKey ?? -1) + 1); }
    } else if (e.key === "ArrowUp") {
      if ($popup.classList.contains("open")) { e.preventDefault(); setActive((activeKey ?? popupItems().length) - 1); }
    } else if (e.key === "Escape") {
      closePopup();
    }
  });

  $popup.addEventListener("mousedown", (e) => {
    const item = e.target.closest(".popup-item");
    if (!item) return;
    e.preventDefault();
    const i = Number(item.dataset.eng);
    const j = Number(item.dataset.idx);
    const h = state[i].hits[j];
    if (h) {
      $q.value = nameOf(h);
      runFullSearch($q.value.trim());
    }
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-wrap")) closePopup();
  });

  $q.addEventListener("focus", () => {
    if (state.some(s => s.hits && s.hits.length > 0) && $q.value.trim()) $popup.classList.add("open");
  });

  const $grid = document.getElementById("weights-grid");
  const $reset = document.getElementById("weights-reset");

  function buildWeights() {
    $grid.innerHTML = Object.keys(VESPA_WEIGHT_DEFAULTS).map(k => `
      <label>
        <span>${esc(k)}</span>
        <input type="number" step="0.1" data-key="${esc(k)}" value="${vespaWeights[k]}" />
      </label>
    `).join("");
  }
  buildWeights();

  function onWeightChange() {
    const text = $q.value.trim();
    if (!text) return;
    if ($columns.hidden === false) runFullSearch(text);
    else runPopupSearch(text);
  }

  $grid.addEventListener("input", (e) => {
    const t = e.target;
    if (!(t instanceof HTMLInputElement)) return;
    const k = t.dataset.key;
    const v = parseFloat(t.value);
    if (!Number.isFinite(v)) return;
    vespaWeights[k] = v;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(onWeightChange, DEBOUNCE_MS);
  });

  $reset.addEventListener("click", () => {
    Object.assign(vespaWeights, VESPA_WEIGHT_DEFAULTS);
    buildWeights();
    onWeightChange();
  });
})();
</script>
</body>
</html>
